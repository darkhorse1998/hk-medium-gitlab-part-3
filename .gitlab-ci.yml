test vm connectivity:
  stage: build
  image: alpinelinux/ansible
  script:
    - mkdir ~/.ssh
    - echo $BASE64_CERT | base64 -d > key.pem
    - chmod 400 key.pem
    - export ANSIBLE_HOST_KEY_CHECKING=False
    - ansible -i inventory.ini -m ping aws

ansible deploy:
  stage: ansible
  image: alpinelinux/ansible
  needs:
    - test vm connectivity
  script:
    - mkdir ~/.ssh
    - echo $BASE64_CERT | base64 -d > key.pem
    - chmod 400 key.pem
    - export ANSIBLE_HOST_KEY_CHECKING=False
    - ansible -i inventory.ini -m ping aws
